    <meta charset="utf-8" />

    <style>
        body { margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #f8f9fa; }
        
        .search-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 92%; max-width: 550px;
            display: flex; gap: 8px;
        }
        #search {
            flex: 1; padding: 12px 20px; border-radius: 30px;
            border: 3px solid #007bff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 16px; outline: none;
        }
        .search-btn {
            width: 70px; background: #007bff; border: none; border-radius: 30px;
            color: white; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex;
            align-items: center; justify-content: center; font-size: 15px;
        }
        .search-btn:active { background: #0056b3; transform: scale(0.95); }

        .leaflet-popup-content-wrapper { border-radius: 15px; width: 340px; padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; width: 340px !important; }
        .popup-header { background: #007bff; color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 16px; }
        .med-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-height: 350px; overflow-y: auto; padding: 12px; background: #fff; }
        .med-item { font-size: 13px; padding: 10px 5px; background: #f8f9fa; border-radius: 8px; cursor: pointer; text-align: center; border: 1px solid #e9ecef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .med-item:hover { background: #e7f1ff; color: #007bff; border-color: #007bff; font-weight: bold; }

        .detail-view { padding: 20px; text-align: center; }
        .detail-name { font-size: 22px; font-weight: bold; color: #d63031; margin-bottom: 10px; }
        /* 노란 강조 박스 유지 및 구역 정보 포함 */
        .detail-pos { font-size: 18px; background: #fff9db; padding: 15px; border-radius: 10px; border: 2px solid #fab005; color: #856404; font-weight: bold; line-height: 1.4; }
        .detail-cat-info { font-size: 14px; color: #b07d05; display: block; margin-top: 5px; font-weight: bold; }
        .btn-back { margin-top: 15px; display: inline-block; cursor: pointer; color: #007bff; font-size: 13px; text-decoration: underline; font-weight: bold; }
    </style>
</head>

    function clearPopups() {
        map.eachLayer(function(layer) { if (layer instanceof L.Popup) map.removeLayer(layer); });
    }

    function showCategoryList(data, latlng) {
        clearPopups();
        var gridHtml = `<div class="popup-header">${data.name}</div><div class="med-grid">`;
        data.items.forEach((item) => {
            gridHtml += `<div class="med-item" onclick="showMedDetail('${item.name}', '${item.pos}', [${latlng.lat}, ${latlng.lng}], '${data.name}')">${item.name}</div>`;
        });
        gridHtml += `</div>`;
        L.popup().setLatLng(latlng).setContent(gridHtml).openOn(map);
    }

    // [완벽 복구] 노란 박스 안에 위치 + 구역 정보 모두 포함
    window.showMedDetail = function(itemName, itemPos, latlngArr, catName) {
        clearPopups();
        var detailHtml = `
            <div class="popup-header">세부 위치 안내</div>
            <div class="detail-view">
                <div class="detail-name">${itemName}</div>
                <div class="detail-pos">
                    📍 ${itemPos}<br>
                    <span class="detail-cat-info">(${catName} 구역)</span>
                </div>
                <div class="btn-back" onclick="reopenCat('${catName}', [${latlngArr[0]}, ${latlngArr[1]}])">◀ 목록으로 돌아가기</div>
            </div>`;
        L.popup({ autoClose: false }).setLatLng(latlngArr).setContent(detailHtml).openOn(map);
    };

    window.reopenCat = function(catName, latlngArr) {
        var data = pharmacyData.find(d => d.name === catName);
        showCategoryList(data, {lat: latlngArr[0], lng: latlngArr[1]});
    };

    pharmacyData.forEach(function(d) {
        var rect = L.rectangle([d.coords.sw, d.coords.ne], { color: '#007bff', weight: 1, fillOpacity: 0.1 }).addTo(map);
        rect.on('click', function(e) { showCategoryList(d, e.latlng); });
        layers.push({ rect: rect, data: d });
    });

    window.executeSearch = function() {
        var q = document.getElementById('search').value.toLowerCase().trim();
        clearPopups();
        layers.forEach(obj => obj.rect.setStyle({ color: '#007bff', fillOpacity: 0.1, weight: 1 }));
        if (q === "") return;

        var firstMatch = null;
        layers.forEach(function(obj) {
            var match = obj.data.items.find(it => it.name.toLowerCase().includes(q));
            if (match) {
                obj.rect.setStyle({ color: 'red', fillOpacity: 0.3, weight: 2 });
                if (!firstMatch) firstMatch = { item: match, layer: obj };
            }
        });

        if (firstMatch) {
            var target = firstMatch.layer;
            map.flyToBounds(target.rect.getBounds(), { padding: [100, 100] });
            // 검색 시에도 동일한 노란 박스 UI 적용
            var detailHtml = `
                <div class="popup-header">검색 결과</div>
                <div class="detail-view">
                    <div class="detail-name">${firstMatch.item.name}</div>
                    <div class="detail-pos">
                        📍 ${firstMatch.item.pos}<br>
                        <span class="detail-cat-info">(${target.data.name} 구역)</span>
                    </div>
                </div>`;
            L.popup().setLatLng(target.rect.getBounds().getCenter()).setContent(detailHtml).openOn(map);
        }
    };
</script>
</body>
</html>
