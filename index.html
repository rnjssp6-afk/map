<!DOCTYPE html>
<html>
<head>
    <title>강서제일큰약국 스마트 지도</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #f8f9fa; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        #map { height: 100vh; width: 100vw; background: #fff; }
        
        /* 검색창 스타일 (모바일 최적화) */
        .search-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 90%; max-width: 420px; }
        input#search { width: 100%; padding: 15px 25px; border: none; border-radius: 30px; box-shadow: 0 4px 25px rgba(0,0,0,0.15); font-size: 16px; outline: none; background: rgba(255,255,255,0.95); transition: all 0.3s; }
        input#search:focus { box-shadow: 0 4px 25px rgba(0,123,255,0.3); background: rgba(255,255,255,1); }
        
        /* 도움말 메시지 */
        .help-tip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.6); color: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; pointer-events: none; white-space: nowrap; }
        
        /* Leaflet 팝업 스타일 커스텀 */
        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 8px; box-shadow: 0 3px 14px rgba(0,0,0,0.2); }
        .leaflet-popup-content b { font-size: 18px; color: #007bff; display: block; margin-bottom: 8px; }
        .leaflet-popup-content small { font-size: 14px; color: #333; line-height: 1.5; display: block; max-height: 200px; overflow-y: auto; }
        .leaflet-popup-tip { background: white; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="search" placeholder="찾으시는 약이나 증상을 입력하세요 (예: 파스, 소화)" onkeyup="searchMedicine()">
</div>

<div class="help-tip">손가락으로 지도를 확대/축소하여 확인하세요</div>

<div id="map"></div>

<script>
    // 1. 지도 초기화 (CRS.Simple 설정으로 평면도 사용, 확대/축소 범위 제한)
    var map = L.map('map', { crs: L.CRS.Simple, minZoom: -1, maxZoom: 2, zoomControl: false }); // ZoomControl 숨김 (모바일 배려)
    var bounds = [[0, 0], [1000, 1000]];
    L.imageOverlay('map.jpg', bounds).addTo(map);
    map.fitBounds(bounds);

    // 2. 약사님이 완성하신 29개 구역 최종 데이터 이식
    var pharmacyData = [{"name":"소화제 음료/쌍화탕","items":"까스활명수, 베나치오, 생록천, 평위천, 위생천, 쌍화탕, 원탕, 광동탕, 십신탕","coords":{"_southWest":{"lat":224,"lng":702},"_northEast":{"lat":254,"lng":992}}},{"name":"드링크(피로회복제)","items":"박카스, 비타500, 가네스, 원비디","coords":{"_southWest":{"lat":185,"lng":700},"_northEast":{"lat":215,"lng":990}}},{"name":"어린이 영양제/건강","items":"텐텐, 마이타민, 리퀴드씨엠, 키크는영양제, 베베락스","coords":{"_southWest":{"lat":336,"lng":708},"_northEast":{"lat":366,"lng":998}}},{"name":"반려동물건강","items":"하트세이버, 하트가드, 강아지 구충제, 고양이 영양제, 귀세정제, 점이액, 알파헥시딘","coords":{"_southWest":{"lat":401,"lng":708},"_northEast":{"lat":431,"lng":998}}},{"name":"임신부/철분/생리/피임","items":"볼그레, 헤모큐, 경구피임약, 생리통약, 진경제","coords":{"_southWest":{"lat":440,"lng":706},"_northEast":{"lat":470,"lng":996}}},{"name":"항산화제/미용/여성용품","items":"글루타치온, 코큐텐, 코엔자임큐텐, 바나바, 커큐민, 피크노제놀, 솔잎추출물, NMN, 콜라겐, 로얄젤리, 스펙트라 유두보호기, 유축깔때기, 갱년기, 임테기, 다이어트약, 아시원정, 아이미산, 질세정제 ","coords":{"_southWest":{"lat":511,"lng":708},"_northEast":{"lat":541,"lng":998}}},{"name":"오메가/혈행/마그네슘/수면","items":"오메가3, 대마종자유, 마그네슘, 마그비, 수면유도제, 슬리펠, 아론, 기넥신, 센시아, 뉴베인, 멜라토닌 ","coords":{"_southWest":{"lat":554,"lng":702},"_northEast":{"lat":584,"lng":1002}}},{"name":"비타민C/두뇌/안정","items":"고려은단vitC, 레모나, 포스파티딜세린, 총명탕, 안정액, 천왕보심단, 청심원, 마음정, 테아닌, 마인트롤","coords":{"_southWest":{"lat":621,"lng":706},"_northEast":{"lat":651,"lng":996}}},{"name":"뼈 관절/비타민B D","items":"로이코비, 큐업, 비맥스, 메가트루, 벤포벨, 투엑스비, 임팩타민, 콘드로이친, MBP, MSM, 콘드로이틴 맥스, 칼슘, 비타민K","coords":{"_southWest":{"lat":662,"lng":706},"_northEast":{"lat":692,"lng":996}}},{"name":"간/프리미엄보약","items":"우루사, 밀크시슬, 아르기닌, 가네톡, 가네타인, 헤파포스, 인태반, 자하거, 알부민, 홍삼, 침향환, 경옥고, 아로나민, 센트룸, 레날민, ","coords":{"_southWest":{"lat":731,"lng":698},"_northEast":{"lat":761,"lng":998}}},{"name":"눈건강/치약, 칫솔","items":"루테인, 인공눈물, 아이미루, 안대, 치간칫솔, 잇치, 치실, 가글","coords":{"_southWest":{"lat":772,"lng":700},"_northEast":{"lat":802,"lng":1000}}},{"name":"모발/남성/구강건강","items":"판시딜, 니조랄, 두피앤, 두피나, 마이녹실, 로게인폼, 미녹시딜, 쏘팔메토, 옥타코사놀, 카리토포텐, 오라메디, 알보칠, 아프니벤큐, ","coords":{"_southWest":{"lat":835,"lng":702},"_northEast":{"lat":865,"lng":1002}}},{"name":"의료기기/염색약","items":"혈압계, 혈당측정기, 체온계, 란셋, 알콜솜, 염색약, 자가진단키트, 오라퀵, 비타센스, 목보호대, 복대, 금연초, 니코레트, 산소캔, 국소마취제, 리도카인, 콘돔","coords":{"_southWest":{"lat":874,"lng":700},"_northEast":{"lat":904,"lng":1000}}},{"name":"보호대/마스크","items":"손목보호대, 무릎보호대, KF94 마스크","coords":{"_southWest":{"lat":963,"lng":630},"_northEast":{"lat":993,"lng":990}}},{"name":"종합감기약/소염제/구충제","items":"판피린, 판콜, 테라플루, 타이레놀, 모드콜, 갈근탕, 콜대원","coords":{"_southWest":{"lat":564,"lng":511},"_northEast":{"lat":904,"lng":551}}},{"name":"비염/코감기/목감기","items":"스트렙실, 모가프텐, 베타딘, 목앤 스프레이, 오트리빈, 코앤쿨 나잘스프레이, 지르텍, 클라리틴, 콘택, 화이투벤 목/코","coords":{"_southWest":{"lat":565,"lng":454},"_northEast":{"lat":905,"lng":494}}},{"name":"위장건강/변비/설사/치질","items":"소화제, 위속엔, 베아제, 훼스탈, 개비스콘, 알마겔, 카베진, 마그밀, 둘코락스, 메이킨, 푸룬주스, 관장약, 슬림락, 정로환, 치질, 푸레파인, 치센, 치지래, ","coords":{"_southWest":{"lat":562,"lng":356},"_northEast":{"lat":902,"lng":396}}},{"name":"버물리/무좀/멍/화상/티눈","items":"후시딘, 마데카솔, 쎄레스톤지, 세레스톤지, 화상연고, 베아로반, 에스로반, 더마큐, 비판텐, D판테놀, 써버쿨, 라미실, 바르지오, 풀케어","coords":{"_southWest":{"lat":565,"lng":304},"_northEast":{"lat":905,"lng":344}}},{"name":"여드름/얼굴케어/입술케어","items":"고운발, 썬크림, 알로에, PDRN, 리쥬비넥스, 스와니코코, EGF 화장품, 애크논, 애크린, 노스카나, 아젤리아, 파티마겔, 멜라토닝, 도미나, 아시클로버, 큐립,","coords":{"_southWest":{"lat":556,"lng":210},"_northEast":{"lat":906,"lng":250}}},{"name":"습윤밴드/밴드","items":"메디폼, 듀오덤, 메피폼, 습윤드레싱, 드레싱밴드, 방수밴드, 화상밴드, 마데카밴드, 케어리브","coords":{"_southWest":{"lat":557,"lng":154},"_northEast":{"lat":907,"lng":194}}},{"name":"소독약/연고/반창고","items":"맥스포스, 에프킬라, 홈매트, 홈키파, 개미, 바퀴벌레약 과산화수소, 포비돈, 빨간약, 에탄올, 거즈, 종이테이프, 생리식염수, 멸균증류수, 골무, 핀셋, 코반, 자가점착테이프, 붕대, 붕산, 붕사, 백반, 명반, 성인용 기저귀, 패드","coords":{"_southWest":{"lat":454,"lng":18},"_northEast":{"lat":894,"lng":68}}},{"name":"각종 파스류","items":"케토톱, 안티푸라민, 아렉스, 신신파스, 쿨파스, 핫파스, 스프레이 파스, 에어파스, 록소앤겔, 맨소래담","coords":{"_southWest":{"lat":955,"lng":156},"_northEast":{"lat":995,"lng":526}}},{"name":"유산균 구역","items":"듀오락, 질유산균, 락토핏, 셀티아이, 구강유산균, 위앤장, ","coords":{"_southWest":{"lat":15,"lng":467},"_northEast":{"lat":65,"lng":717}}},{"name":"냉장 음료수","items":"비배드","coords":{"_southWest":{"lat":10,"lng":728},"_northEast":{"lat":60,"lng":968}}},{"name":"소화/숙취 ","items":"알디콤, 상쾌환, RU21, 취어스","coords":{"_southWest":{"lat":504,"lng":312},"_northEast":{"lat":544,"lng":402}}},{"name":"공진단 구역","items":"공진단","coords":{"_southWest":{"lat":507,"lng":459},"_northEast":{"lat":547,"lng":549}}},{"name":"피로회복제","items":"마그비스피드, 아임비타, 카페인, ","coords":{"_southWest":{"lat":522,"lng":636},"_northEast":{"lat":572,"lng":696}}},{"name":"이달의 상품","items":"에키나시아, 마시는 리쥬란, 여행세트, 붓기세트, 프로폴리스","coords":{"_southWest":{"lat":414,"lng":636},"_northEast":{"lat":474,"lng":696}}},{"name":"2. 어린이건강","items":"챔프, 부루펜, 해열제, 백초, 유아마스크, 열패치, 코뻥, 피지오머","coords":{"_southWest":{"lat":288,"lng":701},"_northEast":{"lat":328,"lng":1001}}}];

    var rects = [];

    // 3. 지도에 고정된 파란색 네모칸 배치
    pharmacyData.forEach(function(d) {
        var sw = [d.coords._southWest.lat, d.coords._southWest.lng];
        var ne = [d.coords._northEast.lat, d.coords._northEast.lng];
        
        var rect = L.rectangle([sw, ne], {
            color: '#007bff',      // 파란색 통일
            weight: 1,            // 선 굵기 축소 (깔끔하게)
            fillOpacity: 0.1,      // 투명도 유지 (지도 보이게)
            interactive: true     // 클릭 가능
        }).addTo(map);
        
        // 팝업 내용 설정 (이름은 크게, 항목은 스크롤 가능하게)
        rect.bindPopup(`<b>${d.name}</b><small>${d.items}</small>`);
        rect.info = d;
        rects.push(rect);
    });

    // 4. 검색 엔진 (환자용 핵심 기능)
    function searchMedicine() {
        var q = document.getElementById('search').value.toLowerCase().trim();
        if(!q) {
            // 검색어 없으면 스타일 초기화
            rects.forEach(r => r.setStyle({ color: '#007bff', fillOpacity: 0.1, weight: 1 }));
            return;
        }

        var found = false;
        rects.forEach(function(r) {
            // 약 이름(items)이나 구역명(name)에 검색어가 포함되면 강조
            if(r.info.items.toLowerCase().includes(q) || r.info.name.includes(q)) {
                if(!found) {
                    // 첫 번째 검색 결과로 부드럽게 이동 및 팝업 열기
                    map.flyToBounds(r.getBounds(), { padding: [120, 120], duration: 1 });
                    r.openPopup();
                    found = true;
                }
                r.setStyle({ color: '#dc3545', fillOpacity: 0.4, weight: 3 }); // 강조색 (빨간색)
            } else {
                r.setStyle({ color: '#007bff', fillOpacity: 0.1, weight: 1 }); // 비강조
            }
        });
    }
</script>
</body>
</html>
